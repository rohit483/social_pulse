<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="50%" stop-color="#FFC83B" />
      <stop offset="100%" stop-color="#2ECC71" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0F172A" rx="20"/>
  <!-- Speech Bubble Frame -->
  <path d="M 150 150 
           L 350 150 
           A 40 40 0 0 1 390 190 
           L 390 290 
           A 40 40 0 0 1 350 330 
           L 260 330 
           L 210 380 
           L 210 330 
           L 150 330 
           A 40 40 0 0 1 110 290 
           L 110 190 
           A 40 40 0 0 1 150 150 Z" 
        fill="none" stroke="url(#pulseGrad)" stroke-width="12" stroke-linejoin="round"/>
  <!-- Inner Pulse Line (The Comment Thread Active Pulse) -->
  <path d="M 150 240 L 210 240 L 230 190 L 250 290 L 270 210 L 290 260 L 310 240 L 350 240" 
        fill="none" stroke="url(#pulseGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
